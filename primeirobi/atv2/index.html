<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2</title>
</head>
<body>
    <header>
        <h1>Página de caadastro</h1>
    </header>
    <form>
        <fieldset>
            <legend>
                Crie sua conta
            </legend>
            <div>
                <label for="nome">Nome</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
            </div>
            <br>
            <div>
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" placeholder="seuemail@dominio.com">
            </div>
            <br>
            <div>
                <label for="senha">Senha    </label><br>
                <input type="password" id="senha" name="senha" required minlength="8">
            </div>
            <br>
            <div>
                <p><strong>Gênero</strong></p>
                <input type="radio" id="feminino" name="genero" value="feminino">
                <label for="feminino">Feminino</label><br>

                <input type="radio" id="masculino" name="genero" value="masculino">
                <label for="masculino">Masculino</label><br>

                <input type="radio" id="outro" name="genero" value="outro">
                <label for="outro">Outro</label>
            </div>
            <br>
            <div>
                <label for="bio">Biografia</label><br>
                <textarea id="bio" name="bio" rows="10" cols="50" placeholder="Fale um pouco sobre você..."></textarea>
            </div>
            <br>
            <div>
                <input type="checkbox" id="concordo" name="concordo" required>
                <label for="concordo">Eu li e aceito os termos de serviço.</label>
            </div>
        </fieldset>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
